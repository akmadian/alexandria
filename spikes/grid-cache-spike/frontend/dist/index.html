<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>grid-cache-spike</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #111; color: #ddd; font: 13px/1.4 -apple-system, system-ui, sans-serif; overflow: hidden; }
  #view { position: fixed; inset: 0; overflow-y: auto; }
  #spacer { position: relative; }
  #spacer img { position: absolute; width: 160px; height: 160px; object-fit: cover; border-radius: 4px; background: #222; }
  #hud { position: fixed; top: 8px; right: 16px; background: rgba(0,0,0,.75); padding: 8px 12px;
         border-radius: 6px; z-index: 10; white-space: pre; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div id="view"><div id="spacer"></div></div>
<div id="hud">starting…</div>
<script>
(async function () {
  // Wait for Wails bindings injection.
  while (!(window.go && window.go.main && window.go.main.App)) {
    await new Promise(r => setTimeout(r, 25));
  }
  const App = window.go.main.App;
  const cfg = await App.GetConfig();

  const TILE = 160, GAP = 8, STEP = TILE + GAP, BUF_ROWS = 3, SPEED = 60; // px per frame ≈ fling
  const view = document.getElementById('view');
  const spacer = document.getElementById('spacer');
  const hud = document.getElementById('hud');

  let cols = 1, rows = 1;
  function layout() {
    cols = Math.max(1, Math.floor((view.clientWidth - GAP) / STEP));
    rows = Math.ceil(cfg.count / cols);
    spacer.style.height = (rows * STEP + GAP) + 'px';
  }
  layout();
  window.addEventListener('resize', () => { layout(); render(); });

  const live = new Map(); // idx -> img element
  function render() {
    const first = Math.max(0, Math.floor(view.scrollTop / STEP) - BUF_ROWS);
    const last = Math.min(rows - 1, Math.ceil((view.scrollTop + view.clientHeight) / STEP) + BUF_ROWS);
    const lo = first * cols, hi = Math.min(cfg.count - 1, (last + 1) * cols - 1);
    for (const [idx, el] of live) {
      if (idx < lo || idx > hi) { el.remove(); live.delete(idx); }
    }
    for (let idx = lo; idx <= hi; idx++) {
      if (live.has(idx)) continue;
      const img = document.createElement('img');
      img.src = '/thumb/' + idx + '.jpg?v=1';
      img.style.left = (GAP + (idx % cols) * STEP) + 'px';
      img.style.top = (GAP + Math.floor(idx / cols) * STEP) + 'px';
      spacer.appendChild(img);
      live.set(idx, img);
    }
  }
  view.addEventListener('scroll', render);
  render();

  function frameStats(deltas) {
    const d = deltas.slice(1).sort((a, b) => a - b);
    if (!d.length) return {};
    const sum = d.reduce((a, b) => a + b, 0);
    return {
      frames: d.length,
      avgMs: +(sum / d.length).toFixed(2),
      p95Ms: +d[Math.floor(d.length * 0.95)].toFixed(2),
      maxMs: +d[d.length - 1].toFixed(2),
      droppedPct: +(100 * d.filter(x => x > 25).length / d.length).toFixed(2),
    };
  }

  function pass(dir) {
    return new Promise(resolve => {
      const deltas = [];
      let last = performance.now();
      function step() {
        const now = performance.now();
        deltas.push(now - last);
        last = now;
        view.scrollTop += dir * SPEED;
        render();
        const atEnd = dir > 0
          ? view.scrollTop >= view.scrollHeight - view.clientHeight - 1
          : view.scrollTop <= 0;
        if (atEnd) resolve(deltas); else requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));

  if (cfg.manual) {
    hud.textContent = 'MANUAL MODE — scroll freely';
    setInterval(async () => {
      const s = await App.GetStats();
      hud.textContent = `MANUAL  tiles:${cfg.count}  hits:${s.total}  unique:${s.unique}`;
    }, 500);
    return;
  }

  hud.textContent = 'warming up…';
  await wait(1500);
  const s0 = await App.GetStats();

  hud.textContent = 'pass 1: scrolling down…';
  const down = await pass(1);
  await wait(800);
  const s1 = await App.GetStats();

  hud.textContent = 'pass 2: scrolling back up…';
  const up = await pass(-1);
  await wait(800);
  const s2 = await App.GetStats();

  const result = {
    platform: navigator.userAgent,
    tiles: cfg.count,
    avgThumbKB: +cfg.avgKB.toFixed(1),
    cols, rows,
    handlerHits: {
      afterInitialPaint: s0,
      afterScrollDown: s1,
      afterScrollUp: s2,
      requestsDuringUpPass: s2.total - s1.total,
      cacheVerdict: (s2.total - s1.total) < cfg.count * 0.05
        ? 'CACHED — scrollback served without backend'
        : 'NOT CACHED — scrollback re-fetched from handler',
    },
    scrollDown: frameStats(down),
    scrollUp: frameStats(up),
  };
  hud.textContent = 'done — writing results';
  await App.LogResult(JSON.stringify(result));
  await App.Quit();
})();
</script>
</body>
</html>
