version: "2"

linters:
  default: standard
  enable:
    - depguard
    - errorlint
    - exhaustive
    - forbidigo
    - gochecknoinits
    - gocritic
    - gosec

  settings:
    depguard:
      rules:
        domain-stdlib-only:
          files:
            - "**/internal/domain/**"
            - "!$test"
          deny:
            - pkg: "github.com/akmadian/alexandria/internal/*"
              desc: "domain must not import other internal packages"
          allow:
            - "$gostd"
            - "github.com/google/uuid"

        ast-purity:
          files:
            - "**/internal/ast/**"
            - "!$test"
          deny:
            - pkg: "database/sql"
              desc: "ast must be pure — no database imports"
            - pkg: "modernc.org/sqlite"
              desc: "ast must be pure — no database imports"
            - pkg: "github.com/akmadian/alexandria/internal/sqlite"
              desc: "ast must not import the sqlite adapter"
            - pkg: "github.com/akmadian/alexandria/internal/catalog"
              desc: "ast must not import catalog"

        no-junk-drawer-packages:
          deny:
            - pkg: "github.com/akmadian/alexandria/internal/utils"
              desc: "no utils package — put it with its concern (coding-guidelines §0)"
            - pkg: "github.com/akmadian/alexandria/internal/common"
              desc: "no common package — put it with its concern (coding-guidelines §0)"
            - pkg: "github.com/akmadian/alexandria/internal/helpers"
              desc: "no helpers package — put it with its concern (coding-guidelines §0)"
            - pkg: "github.com/akmadian/alexandria/internal/base"
              desc: "no base package — put it with its concern (coding-guidelines §0)"
            - pkg: "github.com/akmadian/alexandria/internal/models"
              desc: "no models package — use domain for shared types (coding-guidelines §0)"

    exhaustive:
      default-signifies-exhaustive: true

    forbidigo:
      forbid:
        - pattern: "fmt\\.Print(ln|f)?"
          msg: "use charmbracelet/log, not fmt.Print — see coding-guidelines §4"
          exclude-godoc-examples: true
        - pattern: "os\\.Exit"
          msg: "os.Exit only in main — return errors instead"
          exclude-godoc-examples: true

    gocritic:
      enabled-tags:
        - diagnostic
        - performance

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    paths:
      - third_party
      - ".*\\.gen\\.go$"
    rules:
      - linters: [forbidigo]
        path: "cmd/"
      - linters: [forbidigo]
        path: "_test\\.go$"

formatters:
  enable:
    - gofmt
