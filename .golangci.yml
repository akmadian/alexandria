version: "2"

linters:
  default: standard
  enable:
    # Core Correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # Security & Robustness
    - gosec
    - errorlint
    
    # Style & Maintainability
    - gocritic
    - misspell
    - unconvert
    - nolintlint
    - varnamelen
    
    # Strict Correctness
    - exhaustive
    - depguard
    - forbidigo
    - gochecknoinits
    - copyloopvar

  settings:
    # Abbreviations are often a readability tax, not a benefit.
    # The exceptions are common, well-known, and unambiguous (i/j/k for loops, etc.)
    # We want to enforce readability and clarity in variable names, while allowing for common conventions.
    varnamelen:
      min-length: 3
      allow-underscore: true
      ignore-names:
        - "i"          # loop counters
        - "j"          # loop counters
        - "k"          # loop counters
        - "id"         # common identifier
        - "err"        # common error variable
        - "ok"         # comma-ok idiom (map/type-assert/channel)
        - "ctx"        # common context variables
        - "c"          # common context variables
        - "db"         # common database variables
        - "tx"         # common database variables
        - "tc"         # common test case variable

    depguard:
      rules:
        domain-stdlib-only:
          files:
            - "**/internal/domain/**"
            - "!$test"
          deny:
            - pkg: "github.com/akmadian/alexandria/internal/*"
              desc: "Domain package holds pure types and logic — no non-stdlib imports"
            - pkg: "database/sql"
              desc: "Domain package holds pure types and logic — no non-stdlib imports"
          allow:
            - "$gostd"
            - "github.com/google/uuid"

        ast-purity:
          files:
            - "**/internal/ast/**"
            - "!$test"
          deny:
            - pkg: "database/sql"
              desc: "AST holds pure types and logic — no database imports"
            - pkg: "modernc.org/sqlite"
              desc: "AST holds pure types and logic — no database imports"
            - pkg: "github.com/akmadian/alexandria/internal/sqlite"
              desc: "AST holds pure types and logic — no database imports"
            - pkg: "github.com/akmadian/alexandria/internal/catalog"
              desc: "AST holds pure types and logic — no database imports"

        no-junk-drawer-packages:
          deny:
            - pkg: "github.com/akmadian/alexandria/internal/utils"
              desc: "no utils package — put it with its concern"
            - pkg: "github.com/akmadian/alexandria/internal/common"
              desc: "no common package — put it with its concern"
            - pkg: "github.com/akmadian/alexandria/internal/helpers"
              desc: "no helpers package — put it with its concern"
            - pkg: "github.com/akmadian/alexandria/internal/base"
              desc: "no base package — put it with its concern"
            - pkg: "github.com/akmadian/alexandria/internal/models"
              desc: "no models package — use domain for shared types"

    exhaustive:
      default-signifies-exhaustive: true

    forbidigo:
      forbid:
        - pattern: "fmt\\.Print(ln|f)?"
          msg: "use charmbracelet/log, not fmt.Print — see coding-guidelines §4"
        - pattern: "os\\.Exit"
          msg: "os.Exit only in main — return errors instead"

    gocritic:
      enabled-tags:
        - diagnostic
        - performance

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    paths:
      - third_party
      - ".*\\.gen\\.go$"
    rules:
      - linters: [forbidigo]
        path: "cmd/"
      - linters: [forbidigo]
        path: "_test\\.go$"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0