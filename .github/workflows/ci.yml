name: CI — backend

# One workflow per check surface (backend / frontend / app), each path-filtered
# to its own trigger so a change only spins up the jobs it can affect — the
# separation impl/14 §2 (decision 4) locks. Native path filters (not
# dorny/paths-filter): fine while main is deliberately unprotected for solo
# velocity. When branch protection + required checks arrive (the contribution-
# readiness round), revisit — a required check that never runs because a PR
# didn't touch its paths blocks merge. See _project-tracking/design/ci.md.
on:
  push:
    branches: [main, dev]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - "testdata/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - "testdata/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Version must match the local Homebrew install — findings differ across
      # linter majors, and "local and CI are identical" is the whole contract.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          install-only: true
      # exiftool is a required test dependency: without it the entire xmp sync
      # suite (oscillator guard, echo check, conflict resolution, sidecar merge)
      # and the dependency daemon round-trip self-skip, hiding regressions.
      # No gtk/webkit on purpose: check-backend excludes the root Wails package,
      # and this job passing without those headers IS the toolchain-isolation
      # guarantee (impl/14 §5). The webkit-coupled root build lives in ci-app.yml.
      - name: Install external dependencies needed for tests
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      # check-backend also runs the generated-TS freshness gate (webkit-free):
      # a vocabulary/enum edit here that forgot `make generate-seam` fails.
      - name: Run make check-backend
        run: make check-backend
