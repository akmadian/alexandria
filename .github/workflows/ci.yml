name: CI

# Native path filters (not dorny/paths-filter): fine while main is deliberately
# unprotected for solo velocity. When branch protection + required checks arrive
# (the contribution-readiness round), revisit — a required check that never runs
# because a PR didn't touch its paths blocks merge. See _project-tracking/design/ci.md.
on:
  push:
    branches: [main, dev]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - "testdata/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - "testdata/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Version must match the local Homebrew install — findings differ across
      # linter majors, and "local and CI are identical" is the whole contract.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          install-only: true
      # exiftool is a required test dependency: without it the entire xmp sync
      # suite (oscillator guard, echo check, conflict resolution, sidecar merge)
      # and the dependency daemon round-trip self-skip, hiding regressions.
      # gtk/webkit are build dependencies for the Wails v2 composition root at
      # the repo root (seam round, impl/14). ubuntu-latest (24.04) ships
      # webkit2gtk-4.1 only, so when the wails dependency lands the root package
      # builds with `-tags webkit2_41` (Makefile's concern; noted in impl/12).
      - name: Install external dependencies needed for tests
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Run make check-backend
        run: make check-backend
