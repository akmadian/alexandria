  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

x-direction: column; gap: 9px; }\n  .grp > .gl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); }\n  .row { display: flex; align-items: center; gap: 9px; }\n  .row .l { flex: none; width: 66px; font-size: 10px; color: var(--dim); letter-spacing: 0.03em; }\n  .row .v { flex: none; width: 30px; text-align: right; font-size: 10px; color: var(--ink); }\n  .pills { display: flex; gap: 6px; flex-wrap: wrap; }\n  .pill { font-family: inherit; font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;\n    color: var(--dim); background: rgba(255,255,255,0.03); border: 1px solid var(--line);\n    border-radius: 999px; padding: 5px 11px; cursor: pointer; transition: color .12s, background .12s, border-color .12s; }\n  .pill:hover { color: var(--ink); background: rgba(255,255,255,0.07); }\n  .pill[aria-pressed=\"true\"] { color: #0a0a0a; background: #e9eaee; border-color: transparent; }\n\n  input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 2px; background: rgba(255,255,255,0.22);\n    border-radius: 2px; outline: none; cursor: pointer; }\n  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 11px; height: 11px;\n    border-radius: 2px; background: var(--ink); border: none; cursor: pointer; }\n  input[type=range]::-moz-range-thumb { width: 11px; height: 11px; border-radius: 2px; background: var(--ink); border: none; cursor: pointer; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<pharos-ascii id=\"ph\" interactive=\"\"><\u002Fpharos-ascii>\n\n<div class=\"hud tl\">\n  <div class=\"title\">Pharos of Alexandria<\u002Fdiv>\n  <div class=\"sub\">raymarched SDF → ASCII &nbsp;·&nbsp; one fragment shader, no meshes<br><b>drag<\u002Fb> to orbit &nbsp;·&nbsp; <b>scroll<\u002Fb> to zoom<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"hud br\"><span id=\"fps\">–<\u002Fspan> fps<\u002Fdiv>\n\n<div class=\"ctl\" id=\"ctl\">\n  <div class=\"ctl-h\" id=\"ctl-h\"><span>Controls<\u002Fspan><span class=\"x\" id=\"ctl-x\">–<\u002Fspan><\u002Fdiv>\n  <div class=\"ctl-body\">\n    <div class=\"grp\">\n      <span class=\"gl\">Camera<\u002Fspan>\n      <div class=\"pills\">\n        <button class=\"pill\" id=\"p-auto\" aria-pressed=\"true\">auto-orbit<\u002Fbutton>\n        <button class=\"pill\" id=\"p-dir\">CW<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">speed<\u002Fspan><input type=\"range\" id=\"s-speed\" min=\"0\" max=\"1\" step=\"0.01\"><span class=\"v\" id=\"v-speed\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">elevation<\u002Fspan><input type=\"range\" id=\"s-elev\" min=\"-0.35\" max=\"0.95\" step=\"0.01\"><span class=\"v\" id=\"v-elev\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">up / down<\u002Fspan><input type=\"range\" id=\"s-height\" min=\"-1.2\" max=\"1.6\" step=\"0.01\"><span class=\"v\" id=\"v-height\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">vert drift<\u002Fspan><input type=\"range\" id=\"s-drift\" min=\"0\" max=\"0.5\" step=\"0.01\"><span class=\"v\" id=\"v-drift\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grp\">\n      <span class=\"gl\">Render<\u002Fspan>\n      <div class=\"pills\">\n        <button class=\"pill\" id=\"p-beam\" aria-pressed=\"true\">beam<\u002Fbutton>\n        <button class=\"pill\" id=\"p-mode\">ascii<\u002Fbutton>\n        <button class=\"pill\" id=\"p-ramp\">ramp<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">beam spd<\u002Fspan><input type=\"range\" id=\"s-beam\" min=\"0\" max=\"2\" step=\"0.01\"><span class=\"v\" id=\"v-beam\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">grain<\u002Fspan><input type=\"range\" id=\"s-grain\" min=\"0\" max=\"0.6\" step=\"0.01\"><span class=\"v\" id=\"v-grain\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">detail<\u002Fspan><input type=\"range\" id=\"s-cell\" min=\"4\" max=\"18\" step=\"1\"><span class=\"v\" id=\"v-cell\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grp\">\n      <span class=\"gl\">Light<\u002Fspan>\n      <div class=\"pills\">\n        <button class=\"pill\" id=\"p-shadow\" aria-pressed=\"true\">shadows<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">direction<\u002Fspan><input type=\"range\" id=\"s-laz\" min=\"-3.14\" max=\"3.14\" step=\"0.01\"><span class=\"v\" id=\"v-laz\"><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"l\">sun height<\u002Fspan><input type=\"range\" id=\"s-lel\" min=\"0.05\" max=\"1.4\" step=\"0.01\"><span class=\"v\" id=\"v-lel\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<script src=\"f1d4e9e1-62f6-4c06-9b83-e9ac88ab7cea\"><\u002Fscript>\n<script>\n(() => {\n  const ph = document.getElementById(\"ph\");\n  const D = { speed: 0.2, elev: 0.32, height: 0, drift: 0, beam: 1, beamSpeed: 0.5, grain: 0.15, cell: 7, dir: 1, auto: 1, ramp: 0, mode: 0, lightAz: -0.6, lightEl: 0.7, shadow: 1 };\n  const st = Object.assign({}, D, JSON.parse(localStorage.getItem(\"pharos-ascii-v7\") || \"{}\"));\n\n  const $ = (id) => document.getElementById(id);\n  const persist = () => localStorage.setItem(\"pharos-ascii-v7\", JSON.stringify(st));\n\n  function apply() {\n    ph.setAttribute(\"orbit-speed\", st.speed);\n    ph.setAttribute(\"elevation\", st.elev);\n    ph.setAttribute(\"height\", st.height);\n    ph.setAttribute(\"drift\", st.drift);\n    ph.setAttribute(\"beam\", st.beam);\n    ph.setAttribute(\"beam-speed\", st.beamSpeed);\n    ph.setAttribute(\"grain\", st.grain);\n    ph.setAttribute(\"cell\", st.cell);\n    ph.setAttribute(\"mode\", st.mode);\n    ph.setAttribute(\"orbit-dir\", st.dir);\n    ph.setAttribute(\"auto\", st.auto);\n    ph.setAttribute(\"ramp\", st.ramp);\n    ph.setAttribute(\"light-az\", st.lightAz);\n    ph.setAttribute(\"light-el\", st.lightEl);\n    ph.setAttribute(\"shadow\", st.shadow);\n  }\n\n  // sliders\n  const S = [[\"s-speed\",\"v-speed\",\"speed\",2,\"orbit-speed\"],[\"s-elev\",\"v-elev\",\"elev\",2,\"elevation\"],[\"s-height\",\"v-height\",\"height\",2,\"height\"],\n             [\"s-drift\",\"v-drift\",\"drift\",2,\"drift\"],[\"s-beam\",\"v-beam\",\"beamSpeed\",2,\"beam-speed\"],[\"s-grain\",\"v-grain\",\"grain\",2,\"grain\"],[\"s-cell\",\"v-cell\",\"cell\",0,\"cell\"],\n             [\"s-laz\",\"v-laz\",\"lightAz\",2,\"light-az\"],[\"s-lel\",\"v-lel\",\"lightEl\",2,\"light-el\"]];\n  S.forEach(([sid, vid, key, dp, attr]) => {\n    const el = $(sid); el.value = st[key]; $(vid).textContent = (+st[key]).toFixed(dp);\n    el.addEventListener(\"input\", () => { st[key] = parseFloat(el.value); $(vid).textContent = st[key].toFixed(dp);\n      ph.setAttribute(attr, st[key]); persist(); });\n  });\n\n  // toggles\n  const pAuto = $(\"p-auto\"), pDir = $(\"p-dir\"), pBeam = $(\"p-beam\"), pRamp = $(\"p-ramp\"), pMode = $(\"p-mode\"), pShadow = $(\"p-shadow\");\n  const MODES = [\"ascii\", \"dither\", \"shaded\", \"scanlines\", \"ridgeline\"];\n  const syncToggles = () => {\n    pAuto.setAttribute(\"aria-pressed\", !!st.auto);\n    pBeam.setAttribute(\"aria-pressed\", !!st.beam);\n    pShadow.setAttribute(\"aria-pressed\", !!st.shadow);\n    pDir.textContent = st.dir < 0 ? \"CCW\" : \"CW\";\n    pMode.textContent = MODES[st.mode] || \"ascii\";\n  };\n  pAuto.onclick = () => { st.auto = st.auto ? 0 : 1; ph.setAttribute(\"auto\", st.auto); syncToggles(); persist(); };\n  pDir.onclick = () => { st.dir = st.dir < 0 ? 1 : -1; ph.setAttribute(\"orbit-dir\", st.dir); syncToggles(); persist(); };\n  pBeam.onclick = () => { st.beam = st.beam ? 0 : 1; ph.setAttribute(\"beam\", st.beam); syncToggles(); persist(); };\n  pShadow.onclick = () => { st.shadow = st.shadow ? 0 : 1; ph.setAttribute(\"shadow\", st.shadow); syncToggles(); persist(); };\n  pMode.onclick = () => { st.mode = (st.mode + 1) % 5; ph.setAttribute(\"mode\", st.mode); syncToggles(); persist(); };\n  pRamp.onclick = () => { st.ramp = (st.ramp + 1) % 3; ph.setAttribute(\"ramp\", st.ramp); persist(); };\n\n  // component drives auto-off + camera changes back into state\n  ph.addEventListener(\"autochange\", () => { st.auto = 0; syncToggles(); persist(); });\n  ph.addEventListener(\"orbitchange\", (e) => { st.elev = e.detail.elevation; $(\"s-elev\").value = st.elev; $(\"v-elev\").textContent = st.elev.toFixed(2); persist(); });\n  ph.addEventListener(\"zoomchange\", () => persist());\n  ph.addEventListener(\"fps\", (e) => { $(\"fps\").textContent = e.detail; });\n\n  // collapse\n  const ctl = $(\"ctl\");\n  $(\"ctl-h\").onclick = () => { ctl.classList.toggle(\"collapsed\"); $(\"ctl-x\").textContent = ctl.classList.contains(\"collapsed\") ? \"+\" : \"–\"; };\n\n  syncToggles();\n  apply();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
